name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          brew install clang-format
          export "PATH=$(brew --prefix llvm)/bin:$(brew --prefix clang-format)/bin:$PATH"
          which clang || true
          which clang-format || true
          brew --prefix llvm
          brew --prefix clang-format
          ./build.sh test
